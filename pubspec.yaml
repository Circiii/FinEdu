name: finedu_flutter
description: "FinEdu, educație financiară gamificată pentru tineri"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Interfață
  cupertino_icons: ^1.0.8
  flutter_inset_shadow: ^2.0.3

  # Starea aplicației
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigare
  go_router: ^14.8.1

  # Formatare și traduceri
  intl: ^0.20.2

  # Verificarea conexiunii
  connectivity_plus: ^6.1.5

  # Baza de date locală, sursa de adevăr a aplicației.
  # Fixat pe 2.28.0: drift_dev 2.28.1+ cere source_gen ^3.0.0, care se bate cu
  # riverpod_generator 2.6.5 (source_gen ^2.0.0).
  drift: 2.28.0
  # 0.2.6+ cheamă o funcție drift (isolateDebugLog) care există abia în 2.29+,
  # deși cere doar ^2.21.0, deci rămâne 0.2.5 cât timp drift e pe 2.28.0.
  drift_flutter: 0.2.5
  path_provider: ^2.1.5

  # Serverul
  supabase_flutter: ^2.11.1

  # Id-uri și modele
  uuid: ^4.5.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Notificări locale pentru amintirea zilnică, deocamdată doar pe Android.
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Cardul de share 9:16 pentru Provocarea Zilei.
  share_plus: ^10.1.4
  flutter_animate: ^4.5.2
  lottie: ^3.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices.
  flutter_lints: ^6.0.0

  # Generare de cod și verificări pentru Riverpod
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

  # Generare de cod: schema drift, modele freezed, serializare JSON.
  # Toate fixate pe linia source_gen ^2.0.0, ca să meargă cu riverpod_generator
  # 2.6.5. Versiunile 3.x cer riverpod_generator 3.x, deci așteaptă.
  drift_dev: 2.28.0
  freezed: '>=3.0.0 <3.2.0'
  json_serializable: '>=6.9.0 <6.10.0'
  image: ^4.8.0

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # Pornește generarea traducerilor (app_localizations.dart).
  generate: true

  assets:
    - assets/mascot/
    - assets/icons/
    - assets/lottie/
    - content/
    - content/lessons/
    - content/arcade/
    - content/cashy/
    - content/life_sim/
    - content/life_sim/events/

  fonts:
    - family: Baloo 2
      fonts:
        - asset: assets/fonts/Baloo2-Regular.ttf
          weight: 400
        - asset: assets/fonts/Baloo2-Bold.ttf
          weight: 700
        - asset: assets/fonts/Baloo2-ExtraBold.ttf
          weight: 800
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
