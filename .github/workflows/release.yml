# Construiește aplicația pentru Android și Windows și o atașează la un Release.
#
# Pornește când se împinge un tag de forma v1.0.0. Build-ul de Windows are
# nevoie de Visual Studio, care există deja pe runnerele Windows ale GitHub,
# deci nu trebuie instalat nimic local.
name: Release

on:
  push:
    tags: ['v*']
  # Se poate porni si manual, din tabul Actions.
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Dependențe
        run: flutter pub get

      - name: Traduceri
        run: flutter gen-l10n

      # Câte un fișier per arhitectură, mult mai mic decât unul universal.
      - name: Build APK pe arhitecturi
        run: flutter build apk --release --split-per-abi

      # Plus unul care merge pe orice telefon, pentru cine nu știe ce are.
      - name: Build APK universal
        run: flutter build apk --release

      # Numele generate de Flutter nu spun nimic cuiva care descarcă.
      - name: Redenumește pentru descărcare
        run: |
          cd build/app/outputs/flutter-apk
          v=$(grep '^version:' $GITHUB_WORKSPACE/pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          mv app-arm64-v8a-release.apk   FinEdu-$v-android-arm64.apk
          mv app-armeabi-v7a-release.apk FinEdu-$v-android-arm32.apk
          mv app-release.apk             FinEdu-$v-android-universal.apk
          ls -la FinEdu-*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/FinEdu-*.apk
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Dependențe
        run: flutter pub get

      - name: Traduceri
        run: flutter gen-l10n

      - name: Build Windows
        run: flutter build windows --release

      # Aplicația are nevoie de bibliotecile C++ de la Microsoft. Pe un Windows
      # proaspăt ele lipsesc, iar executabilul nu pornește, cu o eroare despre
      # VCRUNTIME140_1.dll. Le punem lângă el, ca să nu ceară nicio instalare.
      - name: Adaugă bibliotecile C++
        shell: pwsh
        run: |
          $dest = "build\windows\x64\runner\Release"
          $nume = @('msvcp140.dll', 'vcruntime140.dll', 'vcruntime140_1.dll')
          $radacina = 'C:\Program Files\Microsoft Visual Studio'

          foreach ($n in $nume) {
            $gasit = Get-ChildItem -Path $radacina -Filter $n -Recurse -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -match '\\x64\\Microsoft\.VC\d+\.CRT\\' } |
                     Select-Object -First 1
            if (-not $gasit) { throw "Nu am gasit $n" }
            Copy-Item $gasit.FullName -Destination $dest -Force
            Write-Host "$n <- $($gasit.FullName)"
          }

      # Arhivăm tot folderul: executabilul singur nu pornește fără fișierele
      # de lângă el.
      - name: Împachetează
        shell: pwsh
        run: |
          $v = (Select-String '^version:' pubspec.yaml).Line -replace 'version: ','' -split '\+' | Select-Object -First 1
          $src = "build\windows\x64\runner\Release"
          Get-ChildItem $src | Select-Object Name, Length
          Compress-Archive -Path "$src\*" -DestinationPath "FinEdu-$v-windows.zip"
          Get-ChildItem FinEdu-*.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: FinEdu-*.zip
          if-no-files-found: error

  release:
    name: Publică Release
    needs: [android, windows]
    # Doar la tag. Pornit manual de pe un branch, `github.ref_name` ar fi numele
    # branch-ului, iar pasul de mai jos ar publica un release fals, „FinEdu main".
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: fisiere

      - name: Atașează la Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          find fisiere -type f | sort

          # Un tag nu creează singur un Release, deci îl facem dacă lipsește.
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" \
              --title "FinEdu $TAG" --generate-notes
          fi

          gh release upload "$TAG" $(find fisiere -type f) \
            --repo "$REPO" --clobber
