# CI FinEdu — analyze + test + build APK debug.
# Rulează pe push și pull_request către branch-urile v2 și main.
# Nu pot rula acest workflow local — arhitectul verifică sintaxa YAML la primul push.
name: CI

on:
  push:
    branches: [v2, main]
  pull_request:
    branches: [v2, main]

jobs:
  build:
    name: Analyze, test & build APK
    runs-on: ubuntu-latest
    steps:
      # 1. Aducem codul.
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Flutter 3.44.4 exact (versiunea proiectului) + cache pentru viteză.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      # 3. Dependențe.
      - name: Install dependencies
        run: flutter pub get

      # 4. Generăm localizările (ARB -> Dart) înainte de analyze/test.
      - name: Generate localizations
        run: flutter gen-l10n

      # 5. Analiză statică — warning-urile pică build-ul.
      - name: Analyze
        run: flutter analyze --fatal-warnings

      # 6. Teste unitare + widget.
      - name: Test
        run: flutter test

      # 7. Build APK debug (verifică că se compilează cap-coadă).
      - name: Build debug APK
        run: flutter build apk --debug

      # 8. Publicăm APK-ul ca artifact al build-ului.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
